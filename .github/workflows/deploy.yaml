name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.SAUSAGE_STORE_NAMESPACE }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  CHART_VERSION: 0.1.${{ github.run_number }}

jobs:
  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Backend to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: ./backend/
          push: true
          tags: |
            fleetlord/sausage-backend:latest
          build-args: |
            VERSION=${{ github.sha }}

      - name: Push Frontend to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/
          push: true
          tags: |
            fleetlord/sausage-frontend:latest

      - name: Push Backend-report to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: ./backend-report/
          push: true
          tags: |
            fleetlord/sausage-backend-report:latest

  add_helm_chart_to_nexus:
    name: Add Helm Chart To Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build chart dependencies
        run: |
          helm dependency update ./sausage-store-chart

      - name: Lint Helm chart
        run: |
          helm lint ./sausage-store-chart

      - name: Package Helm chart
        run: |
          mkdir -p packaged
          helm package ./sausage-store-chart \
            --destination ./packaged \
            --version ${CHART_VERSION}

      - name: Upload Helm chart to Nexus
        run: |
          curl -v -u "${NEXUS_HELM_REPO_USER}:${NEXUS_HELM_REPO_PASSWORD}" \
            --upload-file ./packaged/sausage-store-${CHART_VERSION}.tgz \
            "${NEXUS_HELM_REPO}/sausage-store-${CHART_VERSION}.tgz"

  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm Chart To Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Prepare kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${KUBE_CONFIG}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Add Nexus Helm repo
        run: |
          helm repo add nexus ${NEXUS_HELM_REPO} \
            --username ${NEXUS_HELM_REPO_USER} \
            --password ${NEXUS_HELM_REPO_PASSWORD}
          helm repo update

      - name: Check chart in Nexus
        run: |
          helm search repo nexus/sausage-store --versions

      - name: Deploy Helm chart
        run: |
          helm upgrade --install sausage-store nexus/sausage-store \
            --version ${CHART_VERSION} \
            --namespace ${SAUSAGE_STORE_NAMESPACE} \
            --create-namespace \
            --wait \
            --timeout 10m \
            --debug