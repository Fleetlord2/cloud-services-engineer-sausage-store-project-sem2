apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  postgres_user: {{ .Values.env.postgresUser | quote }}
  postgres_password: {{ .Values.env.postgresPassword | quote }}
  mongo_uri: {{ .Values.env.mongoUri | quote }}