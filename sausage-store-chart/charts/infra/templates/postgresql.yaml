apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgresql.env.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.postgresql.env.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: {{ .Values.postgresql.containerPort }}
          envFrom:
            - secretRef:
                name: postgresql-secret
          resources:
            requests:
              memory: {{ .Values.postgresql.resources.requests.memory }}
              cpu: {{ .Values.postgresql.resources.requests.cpu }}
            limits:
              memory: {{ .Values.postgresql.resources.limits.memory }}
              cpu: {{ .Values.postgresql.resources.limits.cpu }}
          volumeMounts:
            - name: postgresql-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgresql-storage
          persistentVolumeClaim:
            claimName: postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: {{ .Values.postgresql.containerPort }}
  type: ClusterIP