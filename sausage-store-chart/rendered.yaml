                  key: PORT
            - name: DB
              valueFrom:
                secretKeyRef:
                  name: backend-report-secret
                  key: DB
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
