# sausage-store-chart/values.yaml

global:
  imagePullPolicy: Always

frontend:
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  service:
    port: 80
  ingress:
    host: daboldin1.2sem.students-projects.ru
    path: /
    pathType: Prefix
    tlsSecret: 2sem-students-projects-wildcard-secret
  containerPort: 80
  image: fleetlord/sausage-frontend:latest
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  nginxConf: nginx.conf

backend:
  annotations:
    path: /actuator/prometheus
    port: "8080"
    scrape: "true"
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  vault:
    enabled: "false"
    host: ""
    token: ""
  env:
    postgresUri: jdbc:postgresql://postgresql:5432/sausage-store
    postgresUser: store
    postgresPassword: storepassword
    reportPath: /logs/reports
    logPath: /logs
    mongoUri: mongodb://root:rootpassword@mongodb:27017/sausage-reports?authSource=admin
  service:
    port: 8080
  revisionHistoryLimit: 15
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image: fleetlord/sausage-backend:latest
  imagePullPolicy: Always
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  containerPort: 8080
  vpa:
    enabled: true
    updateMode: "Off"
    minAllowed:
      cpu: "100m"
      memory: "256Mi"
    maxAllowed:
      cpu: "1"
      memory: "512Mi"

backend-report:
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: Recreate
  image: fleetlord/sausage-backend-report:latest
  imagePullPolicy: Always
  containerPort: 8081
  service:
    port: 8081
  env:
    port: "8081"
    mongoUri: mongodb://root:rootpassword@mongodb:27017/sausage-reports?authSource=admin
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    cpuUtilization: 70
    memoryUtilization: 80

infra:
  postgresql:
    image: postgres:15-alpine
    containerPort: 5432
    storage: 1Gi
    env:
      POSTGRES_DB: sausage-store
      POSTGRES_USER: store
      POSTGRES_PASSWORD: storepassword
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "300m"
  mongodb:
    image: mongo:7.0
    env:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    reports:
      database: sausage-store
      user: reports
      password: reportspassword
    containerPort: 27017
    storage: 1Gi
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"